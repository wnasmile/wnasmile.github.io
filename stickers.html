<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sticker picker</title>
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #16161c;
      --surface2: #1e1e27;
      --border: #2a2a38;
      --accent: #a78bfa;
      --accent2: #7c3aed;
      --text: #e2e0f0;
      --muted: #6b6880;
      --success: #4ade80;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, monospace;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    header p {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 5px;
    }

    #searchWrap {
      max-width: 520px;
      margin: 0 auto 24px;
      position: relative;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.88rem;
      padding: 9px 14px 9px 36px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: var(--accent); }

    #searchWrap::before {
      content: '🔍';
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      pointer-events: none;
    }

    #status {
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
      min-height: 18px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .sticker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color 0.18s, transform 0.15s, background 0.15s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .sticker-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-2px);
    }

    .sticker-card:active {
      transform: translateY(0px) scale(0.97);
    }

    .sticker-card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      image-rendering: pixelated;
      border-radius: 4px;
    }

    .sticker-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
    }

    .copied-flash {
      position: absolute;
      inset: 0;
      background: rgba(167, 139, 250, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--success);
      letter-spacing: 0.05em;
      opacity: 0;
      border-radius: var(--radius);
      pointer-events: none;
      transition: opacity 0.12s;
    }

    .sticker-card.flash .copied-flash { opacity: 1; }

    #empty {
      display: none;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 40px 0;
      grid-column: 1/-1;
    }

    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,16,0.92);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-family: monospace;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; }

    @media (max-width: 480px) {
      #grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 8px; }
      .sticker-card img { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>

<header>
  <center><img style="width:400px; height:auto; margin-top:15px;" src="stick.png"/></center>
  <p>click any sticker to copy its shortcode to clipboard</p>
  <!--this is not for personal use, use this for any modifications of the site!-->
  <!--add your own stickers and edit base url, this tool doesnt effect the site itself, edit all.js lol-->
</header>

<div id="searchWrap">
  <input id="search" type="text" placeholder="search stickers..." autocomplete="off" />
</div>

<div id="status">loading stickers...</div>

<div id="grid">
  <div id="empty">no stickers found</div>
</div>

<div id="toast"></div>

<script>
  const EXEC_URL = "https://script.google.com/macros/s/AKfycbwnjKPY_6Xoao2PwcKVnghCQe2ChgnfwdyyQCRHjCVcD3yZaChoaGkcUbd7-qR4el7Blw/exec";
  const BASE_URL = "https://raw.githubusercontent.com/01110010-00110101/01110010-00110101.github.io/main/system/images/stickers/";

  // Parse sticker shortcode tokens from a text string: :path/to/sticker: or :path/to/sticker.ext:
  function parseStickerTokens(text) {
    const tokens = [];
    const re = /:([a-zA-Z0-9_\-\/]+(?:\.(png|gif|webp|jpg|jpeg))?):/gi;
    let match;
    while ((match = re.exec(text)) !== null) {
      tokens.push(match[0]); // full token e.g. :kirby/wake:
    }
    return tokens;
  }

  // Build image src from a shortcode token (same logic as parseQuoteWithImages in all.js)
  function tokenToSrc(token) {
    const inner = token.slice(1, -1); // strip leading/trailing colons
    const hasExt = /\.(png|gif|webp|jpg|jpeg)$/i.test(inner);
    if (hasExt) return BASE_URL + inner;
    return BASE_URL + inner + ".png"; // fallback to .gif handled via onerror
  }

  // Deduplicate tokens — keep first occurrence order
  function dedupeTokens(tokens) {
    const seen = new Set();
    return tokens.filter(t => {
      if (seen.has(t)) return false;
      seen.add(t);
      return true;
    });
  }

  let allTokens = []; // full deduplicated list
  let filteredTokens = [];

  const grid   = document.getElementById("grid");
  const status = document.getElementById("status");
  const search = document.getElementById("search");
  const empty  = document.getElementById("empty");

  // ── Toast ──────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 1800);
  }

  // ── Copy to clipboard ──────────────────────────────────
  async function copyText(text, card) {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      // fallback
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    // flash card
    card.classList.add("flash");
    setTimeout(() => card.classList.remove("flash"), 500);
    showToast(`copied  ${text}`);
  }

  // ── Build a sticker card element ───────────────────────
  function makeCard(token) {
    const card = document.createElement("div");
    card.className = "sticker-card";
    card.title = `click to copy  ${token}`;

    const img = document.createElement("img");
    const src = tokenToSrc(token);
    img.src = src;
    img.alt = token;
    img.loading = "lazy";
    // gif fallback (same as all.js)
    img.onerror = function () {
      if (!this._triedGif) {
        this._triedGif = true;
        const inner = token.slice(1, -1);
        const hasExt = /\.(png|gif|webp|jpg|jpeg)$/i.test(inner);
        if (!hasExt) this.src = BASE_URL + inner + ".gif";
      }
    };

    const label = document.createElement("div");
    label.className = "sticker-label";
    label.textContent = token;

    const flash = document.createElement("div");
    flash.className = "copied-flash";
    flash.textContent = "✓ copied!";

    card.appendChild(img);
    card.appendChild(label);
    card.appendChild(flash);

    card.addEventListener("click", () => {
      // Copy the raw shortcode string (the output field — without image rendering)
      copyText(token, card);
    });

    return card;
  }

  // ── Render filtered list ───────────────────────────────
  function render(tokens) {
    // Remove all cards but keep #empty sentinel
    [...grid.children].forEach(c => { if (c !== empty) c.remove(); });

    if (tokens.length === 0) {
      empty.style.display = "block";
      return;
    }
    empty.style.display = "none";

    const frag = document.createDocumentFragment();
    tokens.forEach(t => frag.appendChild(makeCard(t)));
    grid.appendChild(frag);
  }

  // ── Search filter ──────────────────────────────────────
  search.addEventListener("input", () => {
    const q = search.value.trim().toLowerCase();
    filteredTokens = q ? allTokens.filter(t => t.toLowerCase().includes(q)) : allTokens;
    render(filteredTokens);
    status.textContent = filteredTokens.length + " sticker" + (filteredTokens.length !== 1 ? "s" : "");
  });

  // ── Fetch from Apps Script exec URL (section b) ────────
  async function loadStickers() {
    status.textContent = "fetching stickers...";
    try {
      const res  = await fetch(EXEC_URL);
      const data = await res.json();

      // The b-section response: extract all :token: patterns from every row/field
      const rawTokens = [];

      // Support array of objects (rows) or array of strings or plain string
      const collect = (val) => {
        if (typeof val === "string") {
          parseStickerTokens(val).forEach(t => rawTokens.push(t));
        } else if (Array.isArray(val)) {
          val.forEach(collect);
        } else if (val && typeof val === "object") {
          Object.values(val).forEach(collect);
        }
      };

      collect(data);

      allTokens = dedupeTokens(rawTokens);

      if (allTokens.length === 0) {
        status.textContent = "no sticker shortcodes found in response";
        return;
      }

      filteredTokens = allTokens;
      render(filteredTokens);
      status.textContent = allTokens.length + " sticker" + (allTokens.length !== 1 ? "s" : "") + " loaded";
    } catch (err) {
      console.error(err);
      status.textContent = "failed to load — check console";
      showToast("fetch error :(");
    }
  }

  loadStickers();
</script>
<div style="margin-bottom:30px;"></div>
</body>
</html>
