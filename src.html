<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMG Src Extractor</title>

<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
    font-family: Arial, sans-serif;
    color: white;
  }

  .container {
    padding: 40px;
    border-radius: 16px;
    text-align: center;
    width: 650px;
    max-width: 95%;
  }

  h2 {
    margin-bottom: 20px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .preview-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .preview-box {
    background: #181818;
    border-radius: 12px;
    border: 2px dashed #333;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    max-width: 500px;
    max-height: 500px;
    cursor: pointer;
  }

  .preview-box img {
    max-width: 300px;
    max-height: 300px;
    width: auto;
    height: auto;
    display: block;
  }

  input {
    width: 100%;
    padding: 12px 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    background: #262626;
    color: white;
    margin-bottom: 10px;
  }

  input:focus {
    background: #2f2f2f;
    box-shadow: 0 0 0 2px #1db954;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
  }

  .output-log {
    margin-top: 20px;
    width: 100%;
    max-height: 150px;
    background: #111;
    border-radius: 10px;
    padding: 10px;
    font-size: 12px;
    overflow-y: auto;
    text-align: left;
    word-break: break-all;
    border: 1px solid #333;
  }

  .footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.5;
  }

  /* FULLSCREEN OVERLAY */

  .fullscreen-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .fullscreen-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .fullscreen-overlay img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 30px;
    color: white;
    cursor: pointer;
    user-select: none;
    opacity: 0.8;
    transition: 0.2s;
  }

  .close-btn:hover {
    opacity: 1;
    transform: scale(1.1);
  }

</style>
</head>

<body>

<div class="container">
  <h2>IMG Src Extractor</h2>

  <div class="preview-wrapper">
    <div class="preview-box" id="previewBox">
      <span style="opacity:0.4;">Paste image or &lt;img&gt; tag</span>
    </div>
  </div>

  <input type="text" id="inputField" placeholder="Paste full <img> tag here...">
  <p id="status"></p>

  <div class="output-log" id="outputLog"></div>

  <div class="footer">Automatically extracts & copies the image URL</div>
</div>

<!-- FULLSCREEN VIEW -->
<div class="fullscreen-overlay" id="fullscreenOverlay">
  <div class="close-btn" id="closeBtn">&times;</div>
  <img id="fullscreenImage">
</div>

<script>
  const input = document.getElementById("inputField");
  const status = document.getElementById("status");
  const previewBox = document.getElementById("previewBox");
  const outputLog = document.getElementById("outputLog");

  const overlay = document.getElementById("fullscreenOverlay");
  const fullscreenImage = document.getElementById("fullscreenImage");
  const closeBtn = document.getElementById("closeBtn");

  function setPreview(src) {
    const img = new Image();
    img.onload = function () {
      previewBox.innerHTML = "";
      previewBox.appendChild(img);

      img.addEventListener("dblclick", () => {
        fullscreenImage.src = src;
        overlay.classList.add("active");
      });
    };
    img.src = src;
  }

  function closeFullscreen() {
    overlay.classList.remove("active");
    fullscreenImage.src = "";
  }

  closeBtn.addEventListener("click", closeFullscreen);
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeFullscreen();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeFullscreen();
  });

  document.addEventListener("paste", function (event) {
    const items = event.clipboardData.items;

    for (let item of items) {
      if (item.type.indexOf("image") !== -1) {
        const file = item.getAsFile();
        const reader = new FileReader();

        reader.onload = function(e) {
          setPreview(e.target.result);
        };

        reader.readAsDataURL(file);
        return;
      }
    }
  });

  input.addEventListener("paste", function (event) {
    event.preventDefault();

    const pastedText = (event.clipboardData || window.clipboardData).getData("text");
    const match = pastedText.match(/src\s*=\s*["'](.*?)["']/i);

    if (match && match[1]) {
      const url = match[1];

      setPreview(url);

      navigator.clipboard.writeText(url).then(() => {
        status.textContent = "URL extracted and copied!";
        status.style.color = "#1db954";
      }).catch(() => {
        status.textContent = "⚠ Could not copy automatically.";
        status.style.color = "#ff5252";
      });

      const entry = document.createElement("div");
      entry.textContent = url;
      outputLog.prepend(entry);

      input.value = "";
    } else {
      status.textContent = "No valid src found.";
      status.style.color = "#ff5252";
    }
  });

</script>

</body>
</html>
