/* =====================================================
   SoundScape Floating Widget
   ===================================================== */
:root {
  --widget-size: 55px;
  --panel-radius: 12px;
}

#soundscape-widget {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: var(--widget-size);
  height: var(--widget-size);
  border-radius: 50%;
  cursor: grab;
  /* widget sits BELOW the panel */
  z-index: 99997;
  user-select: none;
  box-shadow:
    0 0 8px rgba(255, 90, 0, 0.65),
    0 0 18px rgba(255, 90, 0, 0.3);
  border: none;
  background: #ff5a00;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#soundscape-widget:active { cursor: grabbing; }

#soundscape-widget-icon {
  width: 33px;
  height: 33px;
  display: block;
  object-fit: contain;
  pointer-events: none;
  flex-shrink: 0;
}

#soundscape-panel {
  position: fixed;
  right: 24px;
  bottom: 92px;
  width: 380px;
  height: 520px;
  border-radius: var(--panel-radius);
  /* overflow visible so resize handle peeks out */
  overflow: visible;
  display: none;
  flex-direction: column;
  box-shadow: 0 14px 40px rgba(0,0,0,.18);
  /* panel sits ABOVE the widget */
  z-index: 99999;
  min-width: 260px;
  min-height: 320px;
  max-width: 90vw;
  max-height: 85vh;
}

/* Fullscreen */
#soundscape-panel.ss-fullscreen {
  position: fixed !important;
  top: 0 !important; left: 0 !important;
  right: 0 !important; bottom: 0 !important;
  width: 100vw !important; height: 100vh !important;
  max-width: 100vw !important; max-height: 100vh !important;
  border-radius: 0 !important;
}

/* iframe must fill the panel exactly */
#soundscape-frame-wrap {
  width: 100%;
  height: 100%;
  position: relative;
  border-radius: var(--panel-radius);
  overflow: hidden;
  overscroll-behavior: contain;
}

#soundscape-panel.ss-fullscreen #soundscape-frame-wrap { border-radius: 0; }

#soundscape-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  /* pointer-events toggled by JS during drag/resize */
}

/* Floating control bar — overlays the iframe top-right */
#soundscape-btns {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 5px;
  z-index: 10;
  pointer-events: all;
  transition: opacity 0.25s, transform 0.25s;
}

/* Fullscreen: buttons are detached to body by JS — no CSS overrides needed here */

.ss-panel-btn {
  width: 26px;
  height: 26px;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  line-height: 1;
  background: rgba(30,30,30,.75);
  color: #fff;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 0.15s;
}
.ss-panel-btn:hover { background: rgba(60,60,60,.92); }

/* Resize handle — sits outside the overflow:hidden frame-wrap */
#ss-resize-handle {
  position: absolute;
  bottom: -1px;
  right: -1px;
  width: 20px;
  height: 20px;
  cursor: se-resize;
  z-index: 10;
  background:
    radial-gradient(circle, rgba(255,255,255,.65) 1.5px, transparent 1.5px)  3px  3px / 5px 5px,
    radial-gradient(circle, rgba(255,255,255,.65) 1.5px, transparent 1.5px)  9px  9px / 5px 5px,
    radial-gradient(circle, rgba(255,255,255,.65) 1.5px, transparent 1.5px) 15px 15px / 5px 5px;
  background-repeat: no-repeat;
  border-bottom-right-radius: var(--panel-radius);
}

#soundscape-panel.ss-fullscreen #ss-resize-handle { display: none; }

@media (max-width: 480px) {
  #soundscape-panel {
    width: calc(100vw - 24px) !important;
    height: 70vh !important;
    right: 12px;
    bottom: 80px;
  }
}

<!-- SoundScape Widget Logic -->
<script>
(() => {
  const ICON_DEFAULT = 'https://raw.githubusercontent.com/syndicatelibrary/awhtpwkuitsfs/main/defaultFav.png';
  const ICON_CLOSE   = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>';
  const IFRAME_SRC   = 'https://syndicatelibrary.github.io./awhtpwkuitsfs/';

  const widget       = document.getElementById('soundscape-widget');
  const panel        = document.getElementById('soundscape-panel');
  const frameWrap    = document.getElementById('soundscape-frame-wrap');
  const closeBtn     = document.getElementById('ss-close-btn');
  const minBtn       = document.getElementById('ss-min-btn');
  const fsBtn        = document.getElementById('ss-fs-btn');
  const resizeHandle = document.getElementById('ss-resize-handle');
  const icon         = document.getElementById('soundscape-widget-icon');

  // ── State ─────────────────────────────────────────────────────────────
  // 'closed' | 'open' | 'minimized'
  let state        = 'closed';
  let isFullscreen = false;
  let iframe       = null;
  let savedStyle   = {};

  // drag
  let dragging = false;
  let moved    = false;
  let dOffX = 0, dOffY = 0;

  // resize
  let resizing = false;
  let rStartX = 0, rStartY = 0, rStartW = 0, rStartH = 0;

  // ── Helpers ───────────────────────────────────────────────────────────
  // Disable iframe pointer events during drag/resize so mousemove isn't swallowed
  function iframePointers(on) {
    if (iframe) iframe.style.pointerEvents = on ? 'auto' : 'none';
  }

  function applyState() {
    if (state === 'closed') {
      panel.style.display = 'none';
      icon.src = ICON_DEFAULT;
    } else if (state === 'open') {
      panel.style.display = 'flex';
      icon.src = ICON_CLOSE;
    } else { // minimized
      panel.style.display = 'none';
      icon.src = ICON_CLOSE;
    }
  }

  // ── Iframe lifecycle ──────────────────────────────────────────────────
  function createIframe() {
    destroyIframe(); // always start fresh
    iframe = document.createElement('iframe');
    iframe.id      = 'soundscape-iframe';
    iframe.src     = IFRAME_SRC;
    iframe.loading = 'eager';
    iframe.allow   = 'fullscreen; autoplay';
    frameWrap.appendChild(iframe);
  }

  function destroyIframe() {
    // Kill by DOM lookup AND variable — belt-and-suspenders
    const el = document.getElementById('soundscape-iframe');
    if (el) { el.src = 'about:blank'; el.remove(); }
    if (iframe && iframe !== el) { iframe.src = 'about:blank'; try { iframe.remove(); } catch(_){} }
    iframe = null;
  }

  // ── Panel actions ─────────────────────────────────────────────────────
  function openPanel() {
    createIframe();
    state = 'open';
    applyState();
  }

  function minimizePanel() {
    if (isFullscreen) exitFullscreen(false);
    state = 'minimized';
    applyState();
  }

  function closePanel() {
    if (isFullscreen) exitFullscreen(false);
    state = 'closed';
    applyState();        // hide panel first
    destroyIframe();     // then kill iframe — order matters
  }

  // ── Fullscreen ────────────────────────────────────────────────────────
  // btnsOverlay: a detached copy of the buttons appended to body in fullscreen
  // so it is completely outside the panel/iframe stacking context
  const btnsOverlay = document.createElement('div');
  btnsOverlay.id = 'ss-btns-overlay';
  btnsOverlay.style.cssText = [
    'position:fixed',
    'top:10px',
    'right:10px',
    'display:none',
    'gap:5px',
    'z-index:2147483647',
    'pointer-events:all',
    'transition:opacity .25s,transform .25s',
    'opacity:0',
    'transform:translateY(-6px)',
  ].join(';');
  // Mirror the three buttons into the overlay
  ;['ss-fs-btn','ss-min-btn','ss-close-btn'].forEach(id => {
    const orig = document.getElementById(id);
    const clone = orig.cloneNode(true);
    clone.dataset.mirrorOf = id;
    clone.addEventListener('click', (e) => {
      e.stopPropagation();
      orig.click(); // delegate to original button handler
    });
    btnsOverlay.appendChild(clone);
  });
  btnsOverlay.classList.add('ss-btns-row');
  // apply flex via style since we're not in a stylesheet
  btnsOverlay.style.display = 'none';
  btnsOverlay.style.flexDirection = 'row'; // set after display:none
  document.body.appendChild(btnsOverlay);

  // Keep overlay button labels in sync with original
  function syncOverlay() {
    btnsOverlay.querySelectorAll('[data-mirror-of]').forEach(clone => {
      const orig = document.getElementById(clone.dataset.mirrorOf);
      clone.textContent = orig.textContent;
      clone.title = orig.title;
    });
  }

  btnsOverlay.classList.add = ((orig) => function(...args) {
    orig.apply(btnsOverlay.classList, args);
    if (args[0] === 'ss-btns-visible') {
      btnsOverlay.style.opacity = '1';
      btnsOverlay.style.transform = 'translateY(0)';
      btnsOverlay.style.pointerEvents = 'all';
    }
  })(btnsOverlay.classList.add.bind(btnsOverlay.classList));

  btnsOverlay.classList.remove = ((orig) => function(...args) {
    orig.apply(btnsOverlay.classList, args);
    if (args[0] === 'ss-btns-visible') {
      btnsOverlay.style.opacity = '0';
      btnsOverlay.style.transform = 'translateY(-6px)';
      btnsOverlay.style.pointerEvents = 'none';
    }
  })(btnsOverlay.classList.remove.bind(btnsOverlay.classList));

  function enterFullscreen() {
    savedStyle = {
      width:  panel.style.width  || '',
      height: panel.style.height || '',
      top:    panel.style.top    || '',
      left:   panel.style.left   || '',
      right:  panel.style.right  || '',
      bottom: panel.style.bottom || '',
    };
    panel.classList.add('ss-fullscreen');
    isFullscreen = true;
    fsBtn.textContent = '⊠'; fsBtn.title = 'Exit Fullscreen';
    syncOverlay();
    // Show the detached overlay
    btnsOverlay.style.display = 'flex';
    btnsOverlay.style.opacity = '0';
    btnsOverlay.style.transform = 'translateY(-6px)';
    btnsOverlay.style.pointerEvents = 'none';
    document.body.style.overflow = 'hidden';
  }

  function exitFullscreen(reapply) {
    panel.classList.remove('ss-fullscreen');
    panel.style.width  = savedStyle.width;
    panel.style.height = savedStyle.height;
    panel.style.top    = savedStyle.top;
    panel.style.left   = savedStyle.left;
    panel.style.right  = savedStyle.right;
    panel.style.bottom = savedStyle.bottom;
    isFullscreen = false;
    fsBtn.textContent = '⛶'; fsBtn.title = 'Fullscreen';
    syncOverlay();
    // Hide the detached overlay
    btnsOverlay.style.display = 'none';
    document.body.style.overflow = '';
    if (reapply !== false) applyState();
  }

  // Fullscreen hover-reveal via document mousemove (works even over iframes)
  document.addEventListener('mousemove', (e) => {
    if (!isFullscreen) return;
    if (e.clientY < 60) {
      btnsOverlay.classList.add('ss-btns-visible');
    } else {
      btnsOverlay.classList.remove('ss-btns-visible');
    }
  });

  fsBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (state !== 'open') return;
    isFullscreen ? exitFullscreen() : enterFullscreen();
  });

  // ── Widget toggle ─────────────────────────────────────────────────────
  widget.addEventListener('click', () => {
    if (moved) { moved = false; return; }
    if      (state === 'closed')    openPanel();
    else if (state === 'open')      minimizePanel();
    else /* minimized */           { state = 'open'; applyState(); }
  });

  closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closePanel(); });
  minBtn.addEventListener('click',   (e) => { e.stopPropagation(); minimizePanel(); });

  // ── Widget drag ───────────────────────────────────────────────────────
  widget.addEventListener('mousedown', (e) => {
    dragging = true;
    moved    = false;
    const rect = widget.getBoundingClientRect();
    dOffX = e.clientX - rect.left;
    dOffY = e.clientY - rect.top;
    widget.style.right  = 'auto';
    widget.style.bottom = 'auto';
    widget.style.left   = rect.left + 'px';
    widget.style.top    = rect.top  + 'px';
    iframePointers(false);
    e.preventDefault();
  });

  widget.addEventListener('touchstart', (e) => {
    dragging = true;
    moved    = false;
    const t    = e.touches[0];
    const rect = widget.getBoundingClientRect();
    dOffX = t.clientX - rect.left;
    dOffY = t.clientY - rect.top;
    widget.style.right  = 'auto';
    widget.style.bottom = 'auto';
    widget.style.left   = rect.left + 'px';
    widget.style.top    = rect.top  + 'px';
    iframePointers(false);
  }, { passive: true });

  // ── Panel resize ──────────────────────────────────────────────────────
  resizeHandle.addEventListener('mousedown', (e) => {
    if (isFullscreen) return;
    e.preventDefault();
    e.stopPropagation();
    resizing = true;
    rStartX  = e.clientX;
    rStartY  = e.clientY;
    rStartW  = panel.offsetWidth;
    rStartH  = panel.offsetHeight;
    iframePointers(false);
  });

  // ── Shared mousemove ──────────────────────────────────────────────────
  document.addEventListener('mousemove', (e) => {
    if (dragging) {
      moved = true;
      let x = Math.max(0, Math.min(e.clientX - dOffX, window.innerWidth  - widget.offsetWidth));
      let y = Math.max(0, Math.min(e.clientY - dOffY, window.innerHeight - widget.offsetHeight));
      widget.style.left = x + 'px';
      widget.style.top  = y + 'px';
    }
    if (resizing) {
      const newW = Math.max(260, Math.min(rStartW + (e.clientX - rStartX), window.innerWidth  * 0.9));
      const newH = Math.max(320, Math.min(rStartH + (e.clientY - rStartY), window.innerHeight * 0.85));
      panel.style.width  = newW + 'px';
      panel.style.height = newH + 'px';
    }
  });

  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    moved = true;
    const t = e.touches[0];
    let x = Math.max(0, Math.min(t.clientX - dOffX, window.innerWidth  - widget.offsetWidth));
    let y = Math.max(0, Math.min(t.clientY - dOffY, window.innerHeight - widget.offsetHeight));
    widget.style.left = x + 'px';
    widget.style.top  = y + 'px';
  }, { passive: true });

  // ── Shared mouseup ────────────────────────────────────────────────────
  document.addEventListener('mouseup', () => {
    if (dragging || resizing) iframePointers(true);
    if (dragging)  { dragging  = false; setTimeout(() => { moved = false; }, 0); }
    if (resizing)  { resizing  = false; }
  });

  document.addEventListener('touchend', () => {
    if (dragging) iframePointers(true);
    dragging = false;
    setTimeout(() => { moved = false; }, 0);
  });

  // ── Scroll isolation ──────────────────────────────────────────────────
  panel.addEventListener('wheel', (e) => { e.stopPropagation(); }, { passive: true });

})();
</script>

<script>

  overlay.className = "shortcuts-overlay";
  overlay.innerHTML = `
    <div class="shortcuts-panel">
      <div class="shortcuts-header"><h2>Shortcuts</h2></div>
      <div class="shortcut"><span class="key">ESC</span><span class="label">Swap to new tab, panic mode.</span></div>
      <div class="shortcut"><span class="key">T</span><span class="label">Toggle tab</span></div>

  });
});
</script>
