<style>
.shortcuts-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-family: sans-serif;
}

.shortcuts-overlay.active {
  display: flex;
}

/* Wider rectangular panel */
.shortcuts-panel {
  background: #0f0f0f;
  color: #fff;
  padding: 20px 25px;
  border-radius: 14px;
  width: 520px;
  max-width: 90%;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* Header with image + title */
.shortcuts-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 15px;
  border-bottom: 1px solid #222;
  padding-bottom: 10px;
}

.shortcuts-header img {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  object-fit: cover;
  background: #222;
}

.shortcuts-header h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
}

/* Rows */
.shortcut {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #1a1a1a;
}

.shortcut:last-child {
  border-bottom: none;
}

/* Key box */
.key {
  background: #1c1c1c;
  border: 1px solid #333;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 13px;
  min-width: 28px;
  text-align: center;
}

/* Label */
.label {
  flex: 1;
  margin-left: 15px;
  font-size: 14px;
  opacity: 0.9;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const trigger = document.getElementById("openShortCuts");

  const overlay = document.createElement("div");
  overlay.className = "shortcuts-overlay";

  overlay.innerHTML = `
    <div class="shortcuts-panel">
      
      <div class="shortcuts-header">
        <h2>Shortcuts</h2>
      </div>

      <div class="shortcut"><span class="key">T</span><span class="label">Toggle tab</span></div>
      <div class="shortcut"><span class="key">R</span><span class="label">Refetch assets</span></div>

      <div class="shortcut"><span class="key">0</span><span class="label">Classic</span></div>
      <div class="shortcut"><span class="key">1</span><span class="label">Redux</span></div>
      <div class="shortcut"><span class="key">2</span><span class="label">Graduation</span></div>
      <div class="shortcut"><span class="key">3</span><span class="label">Wolf</span></div>
      <div class="shortcut"><span class="key">4</span><span class="label">Igor</span></div>
      <div class="shortcut"><span class="key">5</span><span class="label">I Am Music</span></div>
      <div class="shortcut"><span class="key">6</span><span class="label">Selenite</span></div>
      <div class="shortcut"><span class="key">7</span><span class="label">GN Math</span></div>
      <div class="shortcut"><span class="key">8</span><span class="label">Slackerish</span></div>
      <div class="shortcut"><span class="key">9</span><span class="label">Cherrybomb</span></div>

    </div>
  `;

  document.body.appendChild(overlay);

  trigger.addEventListener("click", (e) => {
    e.preventDefault();
    overlay.classList.add("active");
  });

  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) {
      overlay.classList.remove("active");
    }
  });
});
</script>
