<script>
/* ── favorites.html — inline init ──────────────────────────────────────────
   main.js already handles the isFavPage detection and pre-filters the sheet
   data to only favorited titles before building cards (see loadAssets).

   This script adds:
     1. A live count badge in #favCount
     2. An empty-state message when there are no favorites yet
     3. Re-exposes window._refreshFavoritesPage so star-clicks on this page
        can instantly remove cards whose titles were just un-favorited.
   ─────────────────────────────────────────────────────────────────────── */
(function initFavoritesPage() {
  // Update the count badge.
  function updateFavCount() {
    const countEl = document.getElementById("favCount");
    if (!countEl) return;
    const n = window.favorites ? window.favorites.size : 0;
    countEl.textContent = n === 0 ? "" : `(${n})`;
  }

  // Show or hide the empty-state prompt.
  function checkEmpty() {
    const container = document.getElementById("container");
    if (!container) return;
    let emptyMsg = document.getElementById("favEmptyMsg");
    const hasCards = container.querySelectorAll(".ws-favorited").length > 0
      || container.querySelectorAll(".asset-card[style*='flex']").length > 0;

    if (!hasCards) {
      if (!emptyMsg) {
        emptyMsg = document.createElement("p");
        emptyMsg.id = "favEmptyMsg";
        emptyMsg.textContent = "No favorites yet — star assets on the Home page to see them here!";
        emptyMsg.style.cssText = "text-align:center;opacity:0.6;padding:40px 20px;font-size:1em;grid-column:1/-1;";
        container.appendChild(emptyMsg);
      }
      emptyMsg.style.display = "block";
    } else if (emptyMsg) {
      emptyMsg.style.display = "none";
    }
  }

  // Called by the patched saveFavorites (below) so removing a star on this
  // page immediately hides that card.
  window._refreshFavoritesPage = function () {
    updateFavCount();
    const allCards = document.querySelectorAll(".asset-card");
    allCards.forEach(card => {
      const title = (card.dataset.title || "").toLowerCase();
      const isFav = window.favorites && window.favorites.has(title);
      if (!isFav) {
        // Animate out then hide.
        card.style.transition = "opacity 0.25s";
        card.style.opacity = "0";
        setTimeout(() => { card.style.display = "none"; checkEmpty(); }, 260);
      }
    });
    checkEmpty();
  };

  // Patch saveFavorites so removing a star also triggers the live refresh.
  document.addEventListener("DOMContentLoaded", () => {
    const _orig = window.saveFavorites;
    window.saveFavorites = function () {
      _orig && _orig();
      window._refreshFavoritesPage && window._refreshFavoritesPage();
    };
  });

  // Poll briefly after load to set the count once main.js finishes.
  let _attempts = 0;
  const _tick = setInterval(() => {
    updateFavCount();
    checkEmpty();
    if (++_attempts > 20) clearInterval(_tick);
  }, 300);
})();
</script>
