<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WannaSmile | Profile Editor</title>
<link rel="icon" href="system/images/favicons/logoo.png" />
<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-family:monospace;
color:white;
flex-direction:column;
}

.profile-card,.edit-card{
background:#222;
border-radius:16px;
padding:20px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,.5);
}

.profile-card{width:320px;}

.profile-card img{
width:300px;
height:300px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:4px solid #444;
}

.username{
font-size:20px;
margin-bottom:20px;
}

.edit-card{
width:400px;
display:none;
}

.profile-preview{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:3px solid #444;
}

input[type=file]{
margin:15px 0;
color:white;
}

input[type=text]{
padding:10px;
width:80%;
border-radius:6px;
border:none;
margin-bottom:15px;
font-size:16px;
}

.edit-btn,.remove-btn,.save-btn,.return-btn{
display:inline-block;
padding:10px 18px;
font-size:16px;
font-weight:bold;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
transition:transform .2s,background .2s;
}

.edit-btn{background:#ff4444;}
.edit-btn:hover{transform:scale(1.05);background:#ff6666;}

.remove-btn{background:#444;}
.remove-btn:hover{background:#666;}

.save-btn{background:#ff4444;}
.save-btn:hover{background:#ff6666;}

.return-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff0000;
padding:12px 24px;
}

.return-btn:hover{
transform:translateX(-50%) scale(1.05);
background:#ff3333;
}

#cropContainer{
display:none;
margin-top:10px;
}

#cropPreview{
max-width:100%;
border-radius:8px;
}

#cropActions{
margin-top:10px;
}

#cropActions button{
background:#444;
margin:5px;
}
</style>
</head>

<body>

<div class="profile-card" id="profileCard">
<img id="profilePic" src="https://raw.githubusercontent.com/bguhm/bguhm.github.io/main/system/images/profile.png" alt="Profile Picture">
<div class="username" id="username">Nickname</div>
<button class="edit-btn" id="editBtn">Edit Profile</button>
</div>

<div class="edit-card" id="editCard">

<h2>Edit Profile</h2>

<img id="profilePreview" class="profile-preview" src="https://raw.githubusercontent.com/bguhm/bguhm.github.io/main/system/images/profile.png" alt="Profile Preview">

<form id="editForm">

<label for="profilePicInput">Change Profile Picture:</label><br>
<input type="file" id="profilePicInput" accept="image/*"><br>

<button type="button" class="remove-btn" id="removePicBtn">Remove Picture</button>

<div id="cropContainer">

<img id="cropPreview">

<div id="cropActions">
<button type="button" id="cropConfirm">✅ Crop</button>
<button type="button" id="cropCancel">❌ Cancel</button>
</div>

</div>

<br><br>

<label for="usernameInput">Edit Username:</label><br>
<input type="text" id="usernameInput" placeholder="Enter nickname"><br>

<button type="submit" class="save-btn">Save Changes</button>

</form>

</div>

<button class="return-btn" id="returnBtn">Return to Page</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const DEFAULT_PIC="https://raw.githubusercontent.com/bguhm/bguhm.github.io/main/system/images/profile.png"

const el={
profileCard:document.getElementById("profileCard"),
editCard:document.getElementById("editCard"),
profilePic:document.getElementById("profilePic"),
profilePreview:document.getElementById("profilePreview"),
usernameDisplay:document.getElementById("username"),
usernameInput:document.getElementById("usernameInput"),
editBtn:document.getElementById("editBtn"),
removeBtn:document.getElementById("removePicBtn"),
fileInput:document.getElementById("profilePicInput"),
form:document.getElementById("editForm"),
cropContainer:document.getElementById("cropContainer"),
cropPreview:document.getElementById("cropPreview"),
cropConfirm:document.getElementById("cropConfirm"),
cropCancel:document.getElementById("cropCancel"),
returnBtn:document.getElementById("returnBtn")
}

let cropper=null
let croppedImageData=null

function loadProfile(){
const savedPic=localStorage.getItem("profilePic")||DEFAULT_PIC
const savedName=localStorage.getItem("nickname")||"Nickname"

el.profilePic.src=savedPic
el.profilePreview.src=savedPic
el.usernameDisplay.textContent=savedName
el.usernameInput.value=savedName
}

function openEditor(){
el.profileCard.style.display="none"
el.editCard.style.display="block"
}

function closeEditor(){
el.profileCard.style.display="block"
el.editCard.style.display="none"
}

function removePicture(){
el.profilePreview.src=DEFAULT_PIC
localStorage.setItem("profilePic",DEFAULT_PIC)
}

function handleFileInput(event){
const file=event.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=e=>{
el.cropContainer.style.display="block"
el.cropPreview.src=e.target.result

if(cropper) cropper.destroy()

cropper=new Cropper(el.cropPreview,{
aspectRatio:1,
viewMode:1,
background:false,
dragMode:"move"
})
}

reader.readAsDataURL(file)
}

function confirmCrop(){
const canvas=cropper.getCroppedCanvas({width:300,height:300})
croppedImageData=canvas.toDataURL("image/png")

el.profilePreview.src=croppedImageData
el.cropContainer.style.display="none"

cropper.destroy()
cropper=null
}

function cancelCrop(){
el.cropContainer.style.display="none"

if(cropper){
cropper.destroy()
cropper=null
}

el.fileInput.value=""
}

function saveProfile(e){
e.preventDefault()

const username=el.usernameInput.value.trim()

if(username){
localStorage.setItem("nickname",username)
el.usernameDisplay.textContent=username
}

const finalImage=croppedImageData||el.profilePreview.src||DEFAULT_PIC

localStorage.setItem("profilePic",finalImage)
el.profilePic.src=finalImage

closeEditor()
}

function goHome(){
window.location.href=window.location.origin+"/index.html"
}

loadProfile()

el.editBtn.addEventListener("click",openEditor)
el.removeBtn.addEventListener("click",removePicture)
el.fileInput.addEventListener("change",handleFileInput)
el.cropConfirm.addEventListener("click",confirmCrop)
el.cropCancel.addEventListener("click",cancelCrop)
el.form.addEventListener("submit",saveProfile)
el.returnBtn.addEventListener("click",goHome)

})
</script>

</body>
</html>
