     PROFILE OVERLAY

<div id="profileOverlay">
  <div id="profileOverlayPanel">
    <button id="profileOverlayClose" title="Close">✕</button>
    <h2>Edit Profile</h2>

    <img id="profilePreview" class="profile-preview" src="" alt="Profile Preview">
    <div class="profile-overlay-username" id="profileOverlayUsername">Nickname</div>

    <label for="profilePicInput">Change Picture:</label><br>
    <input type="file" id="profilePicInput" accept="image/*"><br>

    <button type="button" id="removePicBtn" class="overlay-btn remove-btn">Remove Picture</button>
    <button type="button" id="pixelToggleBtn" class="overlay-btn pixel-btn">Pixelate</button>

    <div id="cropContainer" style="display:none; margin-top:10px;">
      <img id="cropPreview" style="max-width:100%; border-radius:8px;">
      <div style="margin-top:8px;">
        <button type="button" id="cropConfirm" class="overlay-btn">✅ Crop</button>
        <button type="button" id="cropCancel"  class="overlay-btn">❌ Cancel</button>
      </div>
    </div>

    <br>
    <label for="usernameInput">Username:</label><br>
    <input type="text" id="usernameInput" placeholder="Enter nickname"><br>

    <button type="button" id="profileSaveBtn" class="overlay-btn save-btn">Save Changes</button>
  </div>
</div>

<style>
/* ── Profile Overlay ─────────────────────────── */
#profileOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}
#profileOverlay.visible {
  display: flex;
}
#profileOverlayPanel {
background:
  linear-gradient(rgba(34,34,34,0.1), rgba(34,34,34,0.1)),
  url('https://raw.githubusercontent.com/01110010-00110101/themeify/main/redux/Redux-headerbg.png'),
  #222;

background-size: cover;
background-position: center;
background-repeat: no-repeat;  border-radius: 16px;
  padding: 28px 24px 24px;
  width: 380px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  text-align: center;
  box-shadow: 0 6px 32px rgba(0,0,0,.7);
  font-family: monospace;
  color: #fff;
  position: relative;
}
#profileOverlayClose {
  position: absolute;
  top: 12px; right: 14px;
  background: none; border: none;
  color: #aaa; font-size: 18px;
  cursor: pointer;
  line-height: 1;
}
#profileOverlayClose:hover { color: #fff; }
#profileOverlayPanel h2 {
  margin: 0 0 14px;
  font-size: 18px;
}
.profile-preview {
  width: 200px; height: 200px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #444;
  margin-bottom: 10px;
  display: block;
  margin-left: auto; margin-right: auto;
}
.profile-overlay-username {
  font-size: 15px;
  margin-bottom: 16px;
  opacity: .8;
}
#profileOverlayPanel label {
  display: block;
  text-align: left;
  font-size: 13px;
  margin-bottom: 4px;
  opacity: .75;
}
#profileOverlayPanel input[type="file"] {
  margin: 6px 0 10px;
  color: #ccc;
  font-size: 13px;
}
#profileOverlayPanel input[type="text"] {
  width: 85%;
  padding: 8px 10px;
  border-radius: 6px;
  border: none;
  margin-bottom: 14px;
  font-size: 15px;
  background: #333;
  color: #fff;
}
.overlay-btn {
  display: inline-block;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: bold;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 4px;
  transition: transform .15s, background .15s;
  background: #444;
}
.overlay-btn:hover { transform: scale(1.04); background: #555; }
.remove-btn  { background: #555; }
.pixel-btn   { background: #4a3d7a; }
.pixel-btn:hover { background: #6a5daa; }
.save-btn    { background: #c0392b; }
.save-btn:hover { background: #e74c3c; }
</style>
