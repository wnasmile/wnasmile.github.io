  <style>
    html {
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
    }

    #discoveryPage {
      padding: 2rem;
      text-align: center;
    }

    #discoveryPage h1 {
      font-size: 2rem;
      margin-bottom: 1.2rem;
      display: inline-block; /* prevent block-level width reflow during scale */
      transition: color 0.3s, transform 0.2s;
      will-change: transform;
    }

    #discoveryPage h1:hover {
      color: var(--accent-color);
      transform: scale(1.1);
    }

    #discoveryPage .category-buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1.5rem 0 2rem;
    }

    #discoveryPage .category-buttons button {
      background: var(--header-bg);
      color: var(--url-color);
      border: none;
      border-radius: 8px;
      padding: 0.5em 1.1em;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.95rem;
      transition: background 0.25s, transform 0.2s, color 0.2s;
    }

    #discoveryPage .category-buttons button:hover {
      color: var(--accent-color);
      transform: scale(1.08);
    }

    #discoveryPage .category-buttons button.active {
      background: var(--accent-color);
      color: #fff;
      box-shadow: 0 0 8px var(--accent-color);
    }

    #discoveryPage .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    #discoveryPage .asset-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 0.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #discoveryPage .asset-card:hover {
      transform: scale(1.04);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.18);
    }

    #discoveryPage .asset-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: transparent;
    }

    #discoveryPage .asset-card h4,
    #discoveryPage .asset-card p {
      font-family: monospace;
      transition: color 0.25s;
    }

    #discoveryPage .asset-card h4 {
      margin: 0.45rem 0 0.2rem;
      font-size: 1rem;
      color: var(--url-color);
    }

    #discoveryPage .asset-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #bbb;
    }

    #discoveryPage .asset-card h4:hover,
    #discoveryPage .asset-card p:hover {
      color: var(--accent-color);
    }

    #discoveryPage .asset-card a {
      text-decoration: none;
    }

    #discoveryPage .soon {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Empty / error state — fixed + centred */
    #discoveryStatus {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
    }
    #discoveryStatus.visible {
      display: flex;
    }
    #discoveryStatus p {
      font-family: monospace;
      color: var(--url-color);
      opacity: 0.65;
      text-align: center;
      pointer-events: auto;
    }

    .discovery-search-wrap {
      width: 550px;
      max-width: 90%;
      margin: 0 auto 1.6rem;
    }
  </style>
</head>

  <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const SHEETS_URL    = "https://script.google.com/macros/s/AKfycbyRGROJ70xwLEBLiWAw_7iSX42VkJSxg671wOmjfYo_cvvaDSs9mbXpK6S1EKa9oYQByA/exec";
    const FALLBACK_IMG  = "https://raw.githubusercontent.com/theworldpt1/theworldpt1.github.io/main/system/images/404_blank.png";
    const FALLBACK_LINK = "https://wanna5mile.github.io./source/dino/";

    const container   = document.getElementById("discoveryContainer");
    const statusBox   = document.getElementById("discoveryStatus");
    const statusText  = document.getElementById("discoveryStatusText");
    const searchInput = document.getElementById("searchInput");
    const searchBtn   = document.getElementById("searchBtn");
    const buttons     = document.querySelectorAll(".category-buttons button");

    let assets         = [];
    let activeCategory = null;

    /* ── Status helpers ── */
    function showStatus(msg) {
      statusText.textContent = msg;
      statusBox.classList.add("visible");
    }
    function hideStatus() {
      statusBox.classList.remove("visible");
    }

    /* ── Normalise category strings from the sheet.
       Sheet cells can be: "Platformer", " platformer ", "platformer, action"
       Split on commas, trim, lowercase every token.
    ── */
    function parseCategories(raw) {
      return safeStr(raw)
        .split(",")
        .map(s => s.trim().toLowerCase())
        .filter(Boolean);
    }

    showStatus("Loading assets…");

    /* ── Fetch ── */
    try {
      const res = await fetch(SHEETS_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      const rows = Array.isArray(json) ? json : (json.data || []);

      assets = rows
        .filter(r => r && Object.values(r).some(v => safeStr(v).trim()))
        .map(r => ({
          title:      safeStr(r.title).trim(),
          author:     safeStr(r.author).trim(),
          link:       safeStr(r.link).trim(),
          image:      safeStr(r.image).trim(),
          categories: [
            ...parseCategories(r.category),
            ...parseCategories(r["sub-category"]),
          ],
          status: safeStr(r.status).toLowerCase().trim(),
        }))
        .filter(r => r.title || r.link);

    } catch (err) {
      console.error("[discovery] fetch failed:", err);
      showStatus("⚠ Failed to load game data. Check your connection.");
      return;
    }

    if (!assets.length) {
      showStatus("No games found in the sheet.");
      return;
    }

    /* ── Build grid from a filtered subset of assets ── */
    function buildGrid(list) {
      container.innerHTML = "";

      const visible = list.filter(a =>
        a.status !== "hide" && a.status !== "hidden"
      );

      if (!visible.length) {
        showStatus(activeCategory
          ? `No "${activeCategory}" games found.`
          : "No games match your search.");
        return;
      }
      hideStatus();

      const grid = document.createElement("div");
      grid.className = "assets-grid";

      visible.forEach(asset => {
        const card = document.createElement("div");
        card.className = "asset-card";
        if (asset.status === "soon") card.classList.add("soon");

        const a = document.createElement("a");
        a.href   = asset.link || FALLBACK_LINK;
        a.target = "_blank";
        a.rel    = "noopener noreferrer";

        const img = document.createElement("img");
        img.src     = asset.image || FALLBACK_IMG;
        img.alt     = asset.title;
        img.onerror = () => { img.src = FALLBACK_IMG; };

        const h4 = document.createElement("h4");
        h4.textContent = asset.title || "Untitled";

        const p = document.createElement("p");
        p.textContent = asset.author || "";

        a.append(img, h4, p);
        card.appendChild(a);
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    /* ── Filter: runs on every category click or search input.
       Filters the assets array directly then rebuilds the DOM.
       This avoids stale DOM queries and is reliable regardless of
       when buildGrid was last called.
    ── */
    function applyFilters() {
      const query = searchInput.value.trim().toLowerCase();
      const words = query.split(/\s+/).filter(Boolean);

      const filtered = assets.filter(asset => {
        // Category match — exact token in the parsed categories array
        const matchesCat = !activeCategory
          || asset.categories.includes(activeCategory);

        // Search match — title or author contains every word
        if (!matchesCat) return false;
        if (!query)      return true;
        const hay = (asset.title + " " + asset.author).toLowerCase();
        return words.every(w => hay.includes(w));
      });

      buildGrid(filtered);
    }

    // Initial render — all assets
    buildGrid(assets);

    /* ── Category toggle ── */
    buttons.forEach(btn => {
      btn.addEventListener("click", () => {
        const cat = btn.dataset.category.toLowerCase();
        if (activeCategory === cat) {
          activeCategory = null;
          btn.classList.remove("active");
        } else {
          activeCategory = cat;
          buttons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
        }
        applyFilters();
      });
    });

    /* ── Search ── */
    searchInput.addEventListener("input",   debounce(applyFilters, 150));
    searchBtn.addEventListener("click",     applyFilters);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter")  applyFilters();
      if (e.key === "Escape") {
        searchInput.value = "";
        applyFilters();
      }
    });
  });
  </script>
