<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SundaeZipper | WannaSmile Download</title>
<link id="favicon" rel="icon" href="https://raw.githubusercontent.com/sundaezipper/sundaezipper.github.io/main/favicon.png" />

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- Shoelace -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/themes/light.css" />
<script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/shoelace-autoloader.js"></script>

<link href="profilish.css" rel="stylesheet">
<style>
/* ===== RESET ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
::selection, ::-moz-selection { background: transparent; }

/* ===== BODY ===== */
body {
  background: url("https://raw.githubusercontent.com/wnasmile/wnasmile.github.io/main/assets/images/releaseBg.png") center / cover no-repeat fixed;
  font-family: monospace;
  color: #333;
  line-height: 1.6;
}

/* ===== HEADER ===== */
header {
  width: 100%;
  height: 150px;
  background: url("https://raw.githubusercontent.com/wnasmile/wnasmile.github.io/main/assets/images/releaseHeader.png") center / 100% 100% no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
header img { width: 50%; height: 50%; object-fit: contain; }

#headerProfile {
  position: absolute; top: 10px; right: 10px;
  width: 40px; height: 40px; border-radius: 50%;
  overflow: hidden; cursor: pointer; transition: transform 0.2s; z-index: 5;
}
#headerProfile:hover { transform: scale(1.1); }
#headerProfile img { width: 100%; height: 100%; object-fit: cover; }

/* ===== MAIN CONTAINER ===== */
.container {
  max-width: 900px;
  margin: 2rem auto;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  position: relative;
}

/* ===== BANNER ===== */
.banner { width: 100%; height: 250px; }
.banner img { width: 100%; height: 100%; object-fit: cover; }

/* ===== CONTENT ===== */
.asset-card { padding: 1.5rem; }
.asset-card h2 { color: #ff6f61; margin-bottom: 0.5rem; }
.asset-card ul { padding-left: 1.2rem; margin-bottom: 1.5rem; }

/* ===== BUTTONS ===== */
.download-btn, .support-btn {
  padding: 0.6rem 1.2rem;
  background: #ff6f61;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  margin-right: 0.5rem;
}
.download-btn:hover, .support-btn:hover { background: #e65a4f; }
.download-btn:disabled { background: #ccc; cursor: not-allowed; }

/* ===== OVERLAY ===== */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
  color: white;
  font-family: monospace;
  font-size: 1.1rem;
}
#overlay.active { display: flex; }
#overlay sl-spinner { font-size: 3rem; --track-color: rgba(255,255,255,0.2); --indicator-color: #ff6f61; }

/* ===== PROGRESS ===== */
#progressWrap {
  width: 280px;
  background: rgba(255,255,255,0.15);
  border-radius: 8px;
  height: 8px;
  overflow: hidden;
}
#progressBar {
  height: 100%;
  width: 0%;
  background: #ff6f61;
  transition: width 0.15s ease;
  border-radius: 8px;
}
#progressLabel { font-size: 0.85rem; opacity: 0.8; }

/* ===== ALERTS ===== */
#alertStack {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  max-width: 380px;
}

/* ===== FOOTER ===== */
footer { text-align: center; padding: 2rem; color: #777; }

.contributors {
  display: grid;
  grid-template-columns: repeat(6, auto);
  justify-content: center;
  gap: 5px;
  padding: 20px 0;
}
.contributors img { width: 60px; height: auto; border-radius: 50%; display: block; }
</style>
</head>
<body>

<!-- Overlay (loading screen) -->
<div id="overlay">
  <sl-spinner></sl-spinner>
  <span id="overlayMsg">Preparing ZIP…</span>
  <div id="progressWrap"><div id="progressBar"></div></div>
  <span id="progressLabel"></span>
</div>

<!-- Shoelace alert stack -->
<div id="alertStack"></div>

<header>
  <img src="https://raw.githubusercontent.com/wnasmile/wnasmile.github.io/main/assets/images/title.png" alt="WannaSmile Banner">
</header>

<div class="container">
  <div class="banner">
    <img src="https://raw.githubusercontent.com/wnasmile/wnasmile.github.io/main/assets/images/wannasmile-banner.png" alt="WannaSmile Banner">
  </div>

  <div class="asset-card">
    <!-- Version filled dynamically; fallback shown while loading -->
    <h2 id="releaseTitle">WannaSmile</h2>
    <p>Files included in the ZIP:</p>
    <ul class="file-tree" id="fileTree">
      <li><em>Loading file list…</em></li>
    </ul>

    <button id="download" class="download-btn">Download ZIP</button>
    <button id="support" class="support-btn">Support Creator</button>
  </div>
</div>

<footer>
  &copy; 2025 SundaeZipper | by mcmattyobriore on github
</footer>

<script type="module">
/* ================= CONFIG ================= */
// Single source of truth: all file listing AND downloading from wnasmile repo.
const REPO_OWNER   = "wnasmile";
const REPO_NAME    = "wnasmile.github.io";
const REPO_BRANCH  = "main";
const SUPPORT_URL  = "https://www.youtube.com/@mcmattyobriore";

const REPO_API  = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/trees/${REPO_BRANCH}?recursive=1`;
const BASE_URL  = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${REPO_BRANCH}/`;
const TAGS_API  = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/latest`;

/* ================= ELEMENTS ================= */
const downloadBtn   = document.getElementById("download");
const supportBtn    = document.getElementById("support");
const overlay       = document.getElementById("overlay");
const overlayMsg    = document.getElementById("overlayMsg");
const progressBar   = document.getElementById("progressBar");
const progressLabel = document.getElementById("progressLabel");
const releaseTitle  = document.getElementById("releaseTitle");
const fileTree      = document.getElementById("fileTree");
const alertStack    = document.getElementById("alertStack");

/* ================= SHOELACE ALERTS ================= */
/**
 * @param {string} message
 * @param {"primary"|"success"|"warning"|"danger"|"neutral"} variant
 * @param {string} icon  - shoelace icon name
 * @param {number} duration - ms before auto-close (0 = manual)
 */
function showAlert(message, variant = "neutral", icon = "info-circle", duration = 4000) {
  const alert = Object.assign(document.createElement("sl-alert"), {
    variant,
    closable: true,
    duration,
  });
  alert.innerHTML = `<sl-icon slot="icon" name="${icon}"></sl-icon>${message}`;
  alertStack.appendChild(alert);
  // Shoelace needs the element in DOM before calling toast()
  customElements.whenDefined("sl-alert").then(() => alert.toast());
}

/* ================= VERSION FETCH ================= */
async function fetchVersion() {
  try {
    const res = await fetch(TAGS_API);
    if (!res.ok) return null;
    const data = await res.json();
    return data.tag_name ?? null;
  } catch {
    return null;
  }
}

/* ================= FILE TREE ================= */
async function fetchRepoFiles() {
  try {
    const res = await fetch(REPO_API);
    if (!res.ok) throw new Error(`GitHub API error ${res.status}`);
    const data = await res.json();

    if (data.truncated) {
      showAlert("Repository is very large — file list may be incomplete.", "warning", "exclamation-triangle");
    }

    // Build nested object
    const tree = {};
    data.tree.forEach(({ path }) => {
      const parts = path.split("/");
      let cur = tree;
      parts.forEach((part, i) => {
        if (!cur[part]) cur[part] = i === parts.length - 1 ? null : {};
        cur = cur[part];
      });
    });

    function buildList(obj) {
      const ul = document.createElement("ul");
      for (const key in obj) {
        const li = document.createElement("li");
        if (obj[key] === null) {
          li.textContent = key;
        } else {
          const details = document.createElement("details");
          const summary = document.createElement("summary");
          summary.textContent = key;
          details.append(summary, buildList(obj[key]));
          li.appendChild(details);
        }
        ul.appendChild(li);
      }
      return ul;
    }

    fileTree.innerHTML = "";
    fileTree.appendChild(buildList(tree));
  } catch (err) {
    console.error("File list error:", err);
    fileTree.innerHTML = "<li>Failed to load file list.</li>";
    showAlert("Could not load file list. Check your connection or GitHub rate limits.", "danger", "x-circle");
  }
}

/* ================= DOWNLOAD ZIP ================= */
downloadBtn.addEventListener("click", async () => {
  downloadBtn.disabled = true;
  overlay.classList.add("active");
  overlayMsg.textContent = "Fetching file list…";
  progressBar.style.width = "0%";
  progressLabel.textContent = "";

  try {
    // 1. Fetch repo tree
    const res = await fetch(REPO_API);
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}. You may be rate-limited.`);
    const data = await res.json();

    const blobs = data.tree.filter(item => item.type === "blob");
    if (!blobs.length) throw new Error("No files found in repository.");

    const zip = new JSZip();
    const failed = [];
    let done = 0;

    overlayMsg.textContent = `Downloading ${blobs.length} files…`;

    // 2. Fetch files concurrently with per-file error handling
    //    Limit concurrency to avoid hammering GitHub (batches of 10)
    const BATCH = 10;
    for (let i = 0; i < blobs.length; i += BATCH) {
      const batch = blobs.slice(i, i + BATCH);
      await Promise.all(batch.map(async ({ path }) => {
        try {
          const r = await fetch(BASE_URL + path);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const buf = await r.arrayBuffer();
          zip.file(path, buf, { binary: true });
        } catch (err) {
          console.warn(`Skipped: ${path} — ${err.message}`);
          failed.push(path);
        } finally {
          done++;
          const pct = Math.round((done / blobs.length) * 100);
          progressBar.style.width = `${pct}%`;
          progressLabel.textContent = `${done} / ${blobs.length}`;
        }
      }));
    }

    // 3. Warn about skipped files
    if (failed.length) {
      const noun = failed.length === 1 ? "file was" : "files were";
      showAlert(
        `${failed.length} ${noun} skipped due to download errors and excluded from the ZIP.`,
        "warning",
        "exclamation-triangle",
        6000
      );
      console.table(failed);
    }

    // 4. Generate and trigger download
    overlayMsg.textContent = "Building ZIP…";
    const blob = await zip.generateAsync({ type: "blob" }, ({ percent }) => {
      progressBar.style.width = `${Math.round(percent)}%`;
    });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "wnasmile.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);

    showAlert("Download complete! 🎉", "success", "check-circle", 3000);

  } catch (err) {
    console.error("ZIP error:", err);
    showAlert(`Download failed: ${err.message}`, "danger", "x-circle", 0);
  } finally {
    overlay.classList.remove("active");
    downloadBtn.disabled = false;
  }
});

/* ================= SUPPORT ================= */
supportBtn.addEventListener("click", () => window.open(SUPPORT_URL, "_blank"));

/* ================= INIT ================= */
(async () => {
  const [version] = await Promise.all([fetchVersion(), fetchRepoFiles()]);
  releaseTitle.textContent = version ? `WannaSmile ${version}` : "WannaSmile";
})();
</script>
</body>
</html>
