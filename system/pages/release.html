<!-- Dynamic GitHub file list -->
<script>
async function fetchRepoFiles() {
    const apiUrl = 'https://api.github.com/repos/wnasmile/wnasmile.github.io/git/trees/main?recursive=1';
    try {
        const res = await fetch(apiUrl);
        const data = await res.json();
        const files = data.tree;

        const fileTree = document.getElementById('fileTree');

        // Build a nested tree structure
        const tree = {};

        files.forEach(file => {
            const parts = file.path.split('/');
            let current = tree;
            for (let i = 0; i < parts.length; i++) {
                const part = parts[i];
                if (!current[part]) {
                    current[part] = (i === parts.length - 1) ? null : {};
                }
                current = current[part];
            }
        });

        function buildList(obj) {
            const ul = document.createElement('ul');
            for (const key in obj) {
                const li = document.createElement('li');
                if (obj[key] === null) {
                    li.textContent = key;
                } else {
                    const details = document.createElement('details');
                    const summary = document.createElement('summary');
                    summary.textContent = key;
                    details.appendChild(summary);
                    details.appendChild(buildList(obj[key]));
                    li.appendChild(details);
                }
                ul.appendChild(li);
            }
            return ul;
        }

        fileTree.appendChild(buildList(tree));
    } catch (err) {
        console.error('Error fetching repo files:', err);
        document.getElementById('fileTree').textContent = 'Failed to load file list.';
    }
}

fetchRepoFiles();
</script>
